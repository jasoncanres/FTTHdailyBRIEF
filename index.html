<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTTH Daily Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Newsreader:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1116;
    --bg-elev: #161b22;
    --bg-elev-2: #1c232c;
    --border: #2a3340;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-faint: #5b6675;
    --accent: #93D300;
    --accent-dim: #5a8200;
    --purple: #33006F;
    --purple-light: #6b3fb4;
    --warn: #f0883e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Newsreader', Georgia, serif; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(51, 0, 111, 0.25), transparent 60%),
      var(--bg);
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 32px 24px 80px; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
    padding-bottom: 18px;
    margin-bottom: 32px;
  }
  .brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  h1 {
    font-family: 'Newsreader', serif;
    font-weight: 600;
    font-size: 38px;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }
  h1 .accent {
    color: var(--accent);
    font-style: italic;
    font-weight: 400;
  }
  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    text-align: right;
    line-height: 1.7;
  }
  .meta .live::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    vertical-align: middle;
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .latest-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 48px;
  }
  .latest-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, var(--bg-elev-2), var(--bg-elev));
  }
  .latest-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }
  .latest-title .tag {
    display: inline-block;
    background: var(--accent);
    color: #000;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    border-radius: 2px;
    margin-right: 10px;
    vertical-align: middle;
  }
  .latest-actions {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .latest-actions a {
    color: var(--text-dim);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 2px;
    margin-left: 6px;
    transition: all 0.15s;
  }
  .latest-actions a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
  .latest-frame {
    width: 100%;
    height: 75vh;
    border: 0;
    background: #fff;
  }

  .archive { margin-top: 8px; }
  .month-block { margin-bottom: 36px; }
  .month-head {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--border);
  }
  .month-head .count { color: var(--text-faint); margin-left: 8px; }
  .file-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }
  .file-link {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 14px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    transition: all 0.15s ease;
  }
  .file-link:hover {
    background: var(--bg-elev-2);
    border-color: var(--accent);
    transform: translateX(2px);
  }
  .file-link .date { color: var(--text); }
  .file-link .day { color: var(--text-faint); font-size: 10px; }
  .file-link.is-latest { border-color: var(--accent); border-left-width: 3px; }
  .file-link.is-latest .date::before { content: '* '; color: var(--accent); }

  .status {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .status.error {
    color: var(--warn);
    border: 1px dashed var(--warn);
    border-radius: 4px;
    background: rgba(240, 136, 62, 0.05);
  }

  footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
  }
  footer a { color: var(--text-dim); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  @media (max-width: 640px) {
    h1 { font-size: 28px; }
    header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .meta { text-align: left; }
    .latest-frame { height: 60vh; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="brand">Jason Carnes // GigaPower</div>
      <h1>FTTH <span class="accent">Daily Brief</span></h1>
    </div>
    <div class="meta">
      <div class="live" id="liveStatus">Loading manifest...</div>
      <div id="repoMeta">jasoncanres/FTTHdailyBRIEF</div>
    </div>
  </header>

  <div class="section-label">Today's Brief</div>
  <div id="latestSection" class="latest-card" style="display:none;">
    <div class="latest-header">
      <div class="latest-title">
        <span class="tag">LIVE</span>
        <span id="latestName">-</span>
      </div>
      <div class="latest-actions">
        <a id="latestOpen" href="#" target="_blank" rel="noopener">Open</a>
        <a id="latestRaw" href="#" target="_blank" rel="noopener">Source</a>
      </div>
    </div>
    <iframe id="latestFrame" class="latest-frame" title="Latest FTTH Brief"></iframe>
  </div>

  <div class="section-label">Archive</div>
  <div id="archive" class="archive">
    <div class="status">Fetching briefings from repo...</div>
  </div>

  <footer>
    AUTO-UPDATING VIA GITHUB API - NO MANUAL EDITS REQUIRED -
    <a href="https://github.com/jasoncanres/FTTHdailyBRIEF" target="_blank" rel="noopener">VIEW REPO</a>
  </footer>
</div>

<script>
  const REPO_OWNER = 'jasoncanres';
  const REPO_NAME = 'FTTHdailyBRIEF';
  const BRANCH = 'main';
  const PAGES_BASE = `https://${REPO_OWNER}.github.io/${REPO_NAME}/`;
  const FILE_PATTERN = /^(ftth-)?morning-briefing-(\d{4})-(\d{2})-(\d{2})\.html$/i;

  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  async function loadBriefings() {
    const archiveEl = document.getElementById('archive');
    const liveEl = document.getElementById('liveStatus');
    try {
      const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/?ref=${BRANCH}`;
      const resp = await fetch(apiUrl, { headers: { 'Accept': 'application/vnd.github+json' } });
      if (!resp.ok) throw new Error(`GitHub API returned ${resp.status}`);
      const files = await resp.json();

      const briefings = files
        .filter(f => f.type === 'file' && FILE_PATTERN.test(f.name))
        .map(f => {
          const m = f.name.match(FILE_PATTERN);
          const year = parseInt(m[2], 10);
          const month = parseInt(m[3], 10);
          const day = parseInt(m[4], 10);
          const date = new Date(Date.UTC(year, month - 1, day));
          return {
            name: f.name,
            pagesUrl: PAGES_BASE + f.name,
            githubUrl: f.html_url,
            date: date,
            year: year,
            month: month,
            day: day
          };
        })
        .sort((a, b) => b.date - a.date);

      if (briefings.length === 0) {
        archiveEl.innerHTML = '<div class="status">No briefings found in repo yet.</div>';
        liveEl.textContent = 'No briefings yet';
        return;
      }

      const latest = briefings[0];
      const latestSection = document.getElementById('latestSection');
      const latestFrame = document.getElementById('latestFrame');
      const latestName = document.getElementById('latestName');
      const latestOpen = document.getElementById('latestOpen');
      const latestRaw = document.getElementById('latestRaw');

      latestSection.style.display = 'block';
      latestFrame.src = latest.pagesUrl;
      latestName.textContent = formatLongDate(latest.date) + ' - ' + latest.name;
      latestOpen.href = latest.pagesUrl;
      latestRaw.href = latest.githubUrl;

      liveEl.textContent = `${briefings.length} briefs - latest ${formatShortDate(latest.date)}`;

      const byMonth = {};
      briefings.forEach(b => {
        const key = `${b.year}-${String(b.month).padStart(2,'0')}`;
        if (!byMonth[key]) byMonth[key] = { year: b.year, month: b.month, items: [] };
        byMonth[key].items.push(b);
      });

      const monthKeys = Object.keys(byMonth).sort().reverse();
      archiveEl.innerHTML = monthKeys.map(key => {
        const m = byMonth[key];
        const items = m.items.map((b) => {
          const isLatest = (b === latest);
          return `
            <a class="file-link ${isLatest ? 'is-latest' : ''}" href="${b.pagesUrl}" target="_blank" rel="noopener">
              <span class="date">${formatShortDate(b.date)}</span>
              <span class="day">${DAY_NAMES[b.date.getUTCDay()]}</span>
            </a>
          `;
        }).join('');
        return `
          <div class="month-block">
            <div class="month-head">${MONTH_NAMES[m.month-1]} ${m.year}<span class="count">${m.items.length} brief${m.items.length>1?'s':''}</span></div>
            <div class="file-grid">${items}</div>
          </div>
        `;
      }).join('');

    } catch (err) {
      archiveEl.innerHTML = `<div class="status error">Failed to load briefings: ${err.message}<br><br>If this persists, check that the repo is public and the GitHub API isn't rate-limiting your IP.</div>`;
      liveEl.textContent = 'Error loading';
      console.error(err);
    }
  }

  function formatShortDate(d) {
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
  }
  function formatLongDate(d) {
    return `${DAY_NAMES[d.getUTCDay()]}, ${MONTH_NAMES[d.getUTCMonth()]} ${d.getUTCDate()}, ${d.getUTCFullYear()}`;
  }

  loadBriefings();
</script>
</body>
</html>
